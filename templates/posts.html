{% extends "base.html" %}
{% block content %}

	{% for post in posts %}
		{% with post=post, auth=request.cookies.get('auth') %}
		    {% include "just_post.html" %}
		{% endwith %}
		<hr>
	{% endfor %}
	
	page: {{ pagenum }}/{{ page_count }}<br>

    {% for page in page_range %}
        <a href="/posts?page={{page}}">{{page}}</a>
    {% endfor %}

{% endblock %}
