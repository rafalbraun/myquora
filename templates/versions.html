{% extends "base.html" %}
{% block content %}

<h4>VERSIONS</h4>
<hr>

	{% for post in posts %}
		{% with post=post, auth=request.cookies.get('auth') %}
		    {% include "just_post.html" %}
		{% endwith %}
		<hr>
	{% endfor %}

	page: {{ pagenum }}/{{ page_count }}<br>
	
    {% for page in page_range %}
        <a href="/post/versions/{{post_id}}?page={{page}}">{{page}}</a>
    {% endfor %}

{% endblock %}
